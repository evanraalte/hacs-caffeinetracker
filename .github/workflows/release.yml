name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Build zip asset
        run: |
          cd custom_components
          zip -r ../caffeine_tracker.zip caffeine_tracker
          cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: caffeine_tracker.zip
          generate_release_notes: true
          draft: false
          prerelease: false
