name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - run: uv run ruff check custom_components tests
      - run: uv run ruff format --check custom_components tests
      - run: uv run pyright custom_components

  test:
    name: Test (HA ${{ matrix.ha-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ha-version:
          - "2024.6.0"
          - "stable"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.12"
      - run: uv sync --group dev
      - name: Pin HA version
        if: matrix.ha-version != 'stable'
        run: |
          uv pip install "homeassistant==${{ matrix.ha-version }}"
      - run: uv run pytest --cov=custom_components/caffeine_tracker --cov-report=xml
      - uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        if: matrix.ha-version == 'stable'
        with:
          files: ./coverage.xml

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: hacs/action@main
        with:
          category: integration
